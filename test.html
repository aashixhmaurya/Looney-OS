<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LooneyOS</title>

    <script>
        const user = localStorage.getItem("user");
        if (!user) {
            try {
                window.location.href = "Loginpage.html";
            } catch (error) {
                console.warn("Preview environment sandbox blocked redirect to Loginpage.html");
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME (WIREFRAME / SKETCH STYLE)
           ========================================================================== */
        
         :root {
            --white: #ffffff;
            --black: #000000;
            --grey: #ffffff;
            --yellow: #ffffff;
            --red: #ffffff;
            --blue: #ffffff;
            --green: #ffffff;
            --purple: #ffffff;
            --orange: #ffffff;
            --border-width: 2px;
            --border: var(--border-width) solid var(--black);
            --shadow-solid: 4px 4px 0px var(--black);
            --shadow-hover: 6px 6px 0px var(--black);
            --shadow-active: 0px 0px 0px var(--black);
            --radius-sm: 2px 5px 3px 4px / 4px 2px 5px 3px;
            --radius-md: 4px 8px 5px 6px / 6px 4px 8px 5px;
            --radius-lg: 6px 12px 8px 10px / 10px 8px 12px 6px;
            --bg-color: #ffffff;
            --wallpaper: #ffffff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Architects Daughter', cursive;
            user-select: none;
        }
        
         ::selection {
            background-color: #999999;
            color: #000000;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
        }
        
         ::-moz-selection {
            background-color: #999999;
            color: #000000;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
        }
        
        body {
            overflow: hidden;
            background-color: var(--white);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            touch-action: none;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M6,6 L8,28 L13,23 L18,32 L22,30 L16,21 L25,19 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M5,5 L9,29 L12,24 L17,33 L23,31 L17,22 L26,20 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/><path d='M7,7 L7,27 L14,22 L19,31 L21,29 L15,20 L24,18 Z' fill='none' stroke='black' stroke-width='1.5' stroke-linejoin='round' stroke-linecap='round'/></svg>") 6 6, default;
        }
        
        textarea,
        input[type="text"],
        .term-input,
        .new-folder-input {
            cursor: text !important;
            user-select: text !important;
            -webkit-user-select: text !important;
        }
        
        .term-output,
        .term-output * {
            user-select: text !important;
            -webkit-user-select: text !important;
            cursor: text;
        }
        
        button,
        .looney-btn,
        .desktop-icon,
        .taskbar-item,
        #start-btn,
        .folder,
        .cal-day:not(.empty),
        .cal-prev,
        .cal-next,
        .music-btn,
        .settings-nav-item,
        .drop-zone,
        .context-item,
        .calc-btn,
        .color-btn,
        .size-btn {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M16,16 V5 C16,3 19,3 19,5 V14 C20,13 22,13 23,14 C24,13 26,13 27,15 C28,14 30,15 30,17 V22 C30,27 26,31 21,31 C16,31 13,27 12,23 L9,20 C8,19 9,17 11,18 L14,20 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M15,15 V4 C15,2 18,2 18,4 V13 C19,12 21,12 22,13 C23,12 25,12 26,14 C27,13 29,14 29,16 V21 C29,26 25,30 20,30 C15,30 12,26 11,22 L8,19 C7,18 8,16 10,17 L13,19 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/></svg>") 16 5, pointer !important;
        }
        
        .sketchy-slider::-webkit-slider-thumb {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M16,16 V5 C16,3 19,3 19,5 V14 C20,13 22,13 23,14 C24,13 26,13 27,15 C28,14 30,15 30,17 V22 C30,27 26,31 21,31 C16,31 13,27 12,23 L9,20 C8,19 9,17 11,18 L14,20 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M15,15 V4 C15,2 18,2 18,4 V13 C19,12 21,12 22,13 C23,12 25,12 26,14 C27,13 29,14 29,16 V21 C29,26 25,30 20,30 C15,30 12,26 11,22 L8,19 C7,18 8,16 10,17 L13,19 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/></svg>") 16 5, pointer !important;
        }
        
        .sketchy-slider::-moz-range-thumb {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M16,16 V5 C16,3 19,3 19,5 V14 C20,13 22,13 23,14 C24,13 26,13 27,15 C28,14 30,15 30,17 V22 C30,27 26,31 21,31 C16,31 13,27 12,23 L9,20 C8,19 9,17 11,18 L14,20 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M15,15 V4 C15,2 18,2 18,4 V13 C19,12 21,12 22,13 C23,12 25,12 26,14 C27,13 29,14 29,16 V21 C29,26 25,30 20,30 C15,30 12,26 11,22 L8,19 C7,18 8,16 10,17 L13,19 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/></svg>") 16 5, pointer !important;
        }
        /* Scrollbars */
        
         ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
         ::-webkit-scrollbar-track {
            background: var(--white);
            border-left: var(--border);
        }
        
         ::-webkit-scrollbar-thumb {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 2px;
        }
        
         ::-webkit-scrollbar-thumb:hover {
            background: var(--black);
        }
        /* Context Menu (Right Click) */
        
        #context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(0, 0, 0, 0.7);
            border-radius: 15px 255px 10px 225px / 225px 10px 255px 15px;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
            padding: 5px;
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 100000;
            min-width: 150px;
        }
        
        .context-item {
            padding: 6px 10px;
            font-size: 0.95rem;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.85);
            border-radius: var(--radius-sm);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .context-item:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--black);
            transform: translateX(3px);
        }
        
        .context-item svg {
            stroke: rgba(0, 0, 0, 0.85);
        }
        
        .context-item:hover svg {
            stroke: var(--black);
        }
        /* Logo CSS Recreation (Big) */
        
        .logo-mark {
            position: relative;
            width: 75px;
            height: 60px;
            margin-bottom: 10px;
        }
        
        .l-vert {
            position: absolute;
            left: 0;
            top: 0;
            width: 18px;
            height: 60px;
            background: var(--black);
            border-radius: 9px;
        }
        
        .l-horiz {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50px;
            height: 18px;
            background: var(--black);
            border-radius: 9px;
        }
        
        .l-end {
            position: absolute;
            left: 32px;
            bottom: 0;
            width: 18px;
            height: 35px;
            background: var(--black);
            border-radius: 9px;
        }
        
        .l-dot {
            position: absolute;
            left: 60px;
            top: 12px;
            width: 15px;
            height: 15px;
            background: var(--black);
            border-radius: 50%;
        }
        /* Mini Logo for Taskbar */
        
        .mini-logo {
            position: relative;
            width: 32px;
            height: 24px;
        }
        
        .mini-l-vert {
            position: absolute;
            left: 0;
            top: 0;
            width: 7px;
            height: 24px;
            background: var(--black);
            border-radius: 4px;
        }
        
        .mini-l-horiz {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 22px;
            height: 7px;
            background: var(--black);
            border-radius: 4px;
        }
        
        .mini-l-end {
            position: absolute;
            left: 15px;
            bottom: 0;
            width: 7px;
            height: 14px;
            background: var(--black);
            border-radius: 4px;
        }
        
        .mini-l-dot {
            position: absolute;
            left: 26px;
            top: 3px;
            width: 6px;
            height: 6px;
            background: var(--black);
            border-radius: 50%;
        }
        
        .logo-text {
            font-family: serif;
            font-size: 3.5rem;
            letter-spacing: 3px;
            color: var(--black);
            font-weight: bold;
        }
        /* ==========================================================================
           4. DESKTOP
           ========================================================================== */
        
        #desktop {
            flex: 1;
            position: relative;
            background-color: var(--white);
            overflow: hidden;
            display: block;
            z-index: 1;
        }
        
        #desktop::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--wallpaper);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0.9;
            pointer-events: none;
        }
        
        #desktop-icons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            padding: 1rem;
            height: 100%;
            align-content: start;
            position: relative;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            z-index: 1;
        }
        
        .desktop-icon:hover {
            transform: scale(1.05) translateY(-5px);
        }
        
        .desktop-icon:active {
            transform: scale(0.95);
        }
        
        .desktop-icon .emoji {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border: 2px solid var(--black);
            background-color: var(--white);
            margin-bottom: 5px;
            transition: transform 0.2s;
            box-shadow: 2px 2px 0px var(--black);
            pointer-events: none;
        }
        
        .desktop-icon:nth-child(1) .emoji {
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            transform: skewX(-3deg);
        }
        
        .desktop-icon:nth-child(2) .emoji {
            border-radius: 15px 255px 10px 225px / 225px 10px 255px 15px;
            transform: skewY(3deg);
        }
        
        .desktop-icon:nth-child(3) .emoji {
            border-radius: 225px 15px 255px 10px / 15px 255px 10px 225px;
            transform: skewX(2deg) rotate(2deg);
        }
        
        .desktop-icon:nth-child(4) .emoji {
            border-radius: 15px 225px 15px 255px / 255px 15px 225px 15px;
            transform: rotate(-2deg);
        }
        
        .desktop-icon:nth-child(5) .emoji {
            border-radius: 255px 20px 225px 10px / 20px 225px 10px 255px;
            transform: skewY(-2deg) skewX(2deg);
        }
        
        .desktop-icon:nth-child(6) .emoji {
            border-radius: 10px 255px 15px 225px / 225px 15px 255px 10px;
            transform: skewX(-2deg) rotate(-1deg);
        }
        
        .desktop-icon:nth-child(7) .emoji {
            border-radius: 20px 255px 10px 225px / 255px 10px 225px 20px;
            transform: skewY(1deg);
        }
        
        .desktop-icon:nth-child(8) .emoji {
            border-radius: 255px 10px 225px 20px / 10px 225px 20px 255px;
            transform: skewX(1deg);
        }
        
        .desktop-icon:nth-child(9) .emoji {
            border-radius: 15px 225px 20px 255px / 255px 15px 225px 20px;
            transform: skewY(-1deg) skewX(2deg);
        }
        
        .desktop-icon:nth-child(10) .emoji {
            border-radius: 200px 20px 200px 15px / 15px 200px 20px 200px;
            transform: skewY(1deg) skewX(-1deg);
        }
        
        .desktop-icon .emoji svg {
            width: 32px;
            height: 32px;
            stroke: var(--black);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        .desktop-icon span {
            color: var(--black);
            font-size: 1rem;
            font-weight: bold;
            margin-top: 4px;
            background: transparent;
            border: none;
            box-shadow: none;
            pointer-events: none;
        }
        /* ==========================================================================
           5. WINDOW SYSTEM
           ========================================================================== */
        
        .window {
            position: absolute;
            width: 450px;
            max-width: 95vw;
            height: 350px;
            max-height: calc(100vh - 80px);
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
            box-shadow: var(--shadow-solid);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(1);
            opacity: 1;
            animation: windowPop 0.3s ease-out backwards;
            min-width: 300px;
            min-height: 200px;
        }
        
        .window.closing {
            animation: windowClose 0.2s ease-in forwards !important;
            pointer-events: none;
        }
        
        .window.maximized {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            border-radius: 0;
            box-shadow: none;
            transition: all 0.2s ease;
        }
        
        .window.minimized {
            opacity: 0;
            pointer-events: none;
            transform: translateY(50px) scale(0.8);
            transition: all 0.2s ease;
        }
        
        @keyframes windowPop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        @keyframes windowClose {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0.8);
                opacity: 0;
            }
        }
        
        .window-header {
            background: var(--white) !important;
            border-bottom: 2px solid var(--black);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            color: var(--black) !important;
        }
        
        .window-header:active {
            cursor: grabbing;
        }
        
        .window-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--black) !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .window-title svg {
            width: 20px;
            height: 20px;
            stroke: var(--black);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        .window-content {
            flex: 1;
            background: var(--white);
            position: relative;
            overflow: auto;
            display: flex;
            flex-direction: column;
            color: var(--black);
        }
        
        .resize-handle {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            cursor: se-resize;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* ==========================================================================
           6. TASKBAR
           ========================================================================== */
        
        #taskbar {
            height: 60px;
            background: var(--white);
            border-top: 3px solid var(--black);
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 999;
            transition: background-color 0.2s, border-width 0.2s;
        }
        
        #taskbar.drag-over {
            background-color: #e0e0e0;
            border-top-width: 6px;
        }
        
        #start-btn {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 5px 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--black);
        }
        
        #start-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--black);
        }
        
        #start-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }
        
        #taskbar-apps {
            display: flex;
            flex: 1;
            gap: 10px;
            margin-left: 15px;
            margin-right: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        #taskbar-apps::-webkit-scrollbar {
            display: none;
        }
        
        .taskbar-item {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 5px 10px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            display: flex;
            align-items: center;
            gap: 5px;
            max-width: 150px;
            flex: 0 1 auto;
            min-width: 36px;
            color: var(--black);
        }
        
        .taskbar-item svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            flex-shrink: 0;
        }
        
        .taskbar-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .taskbar-item.active {
            background: var(--black);
            color: var(--white);
            box-shadow: none;
            transform: translate(2px, 2px);
        }
        
        #clock {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 5px 15px;
            font-weight: bold;
            box-shadow: 2px 2px 0px var(--black);
            color: var(--black);
            letter-spacing: 2px;
        }
        /* ==========================================================================
           7. APP SPECIFIC STYLES
           ========================================================================== */
        
        .looney-btn {
            background: var(--white);
            color: var(--black);
            border: 2px solid var(--black);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: var(--radius-sm);
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: all 0.1s;
        }
        
        .looney-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--black);
        }
        
        .looney-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }
        /* Notepad */
        
        .app-notepad {
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 10px;
        }
        
        .app-notepad textarea {
            flex: 1;
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 10px;
            font-size: 1.1rem;
            resize: none;
            background: var(--white);
            color: var(--black);
            background-image: repeating-linear-gradient(transparent, transparent 24px, #ddd 24px, #ddd 25px);
            line-height: 25px;
        }
        
        .app-notepad .toolbar {
            display: flex;
            justify-content: flex-end;
        }
        /* Terminal */
        
        .app-terminal {
            background: var(--white);
            color: var(--black);
            font-family: monospace;
            padding: 10px;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .app-terminal .output {
            flex: 1;
            display: flex;
            flex-direction: column;
            font-family: monospace;
        }
        
        .app-terminal .input-line {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        
        .app-terminal .prompt {
            color: var(--black);
            margin-right: 10px;
            font-family: monospace;
            font-weight: bold;
        }
        
        .app-terminal input {
            background: transparent;
            border: none;
            color: var(--black);
            font-family: monospace;
            font-size: 1rem;
            flex: 1;
            outline: none;
        }
        /* Doodle Pad */
        
        .app-doodle {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 10px;
            gap: 10px;
        }
        
        .doodle-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .doodle-viewport {
            flex: 1;
            overflow: hidden;
            border: 2px solid var(--black);
            border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 0, 0, 0.03) 10px, rgba(0, 0, 0, 0.03) 12px);
            position: relative;
        }
        
        .doodle-canvas {
            background: var(--white);
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
            cursor: crosshair;
        }
        
        .doodle-palette {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        const state = {

        };

        let saveTimeout;

        function saveSystem() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem("looney_state", JSON.stringify({
                    openApps: Object.keys(state.openWindows)
                }));
            }, 500);
        }

        let windowSizes = {};
        try {
            const savedSizes = localStorage.getItem('looney_window_sizes');
            if (savedSizes && savedSizes !== "undefined") windowSizes = JSON.parse(savedSizes) || {};
        } catch (e) {}

        let savedIconPositions = {};
        try {
            const savedIcons = localStorage.getItem('looney_icon_positions');
            if (savedIcons && savedIcons !== "undefined") savedIconPositions = JSON.parse(savedIcons) || {};
        } catch (e) {}

        try {
            const savedWP = localStorage.getItem('looney_wallpaper');
            if (savedWP) document.documentElement.style.setProperty('--wallpaper', `url(${savedWP})`);
        } catch (e) {}

        let iconOrder = [];
        try {
            const savedOrder = localStorage.getItem('looney_icon_order');
            if (savedOrder && savedOrder !== "undefined") {
                iconOrder = JSON.parse(savedOrder);
                let modified = false;
                if (iconOrder.includes('game') || iconOrder.includes('snake')) {
                    iconOrder = iconOrder.filter(id => id !== 'game' && id !== 'snake');
                    if (!iconOrder.includes('games')) iconOrder.push('games');
                    modified = true;
                }
                if (modified) localStorage.setItem('looney_icon_order', JSON.stringify(iconOrder));
            }
        } catch (e) {}

        let orderChanged = false;
        Object.keys(state.apps).forEach(appId => {
            if (!iconOrder.includes(appId) && appId !== 'game' && appId !== 'snake') {
                iconOrder.push(appId);
                orderChanged = true;
            }
        });

        if (orderChanged) {
            try {
                localStorage.setItem('looney_icon_order', JSON.stringify(iconOrder));
            } catch (e) {}

        const elements = {
            desktop: document.getElementById('desktop'),
            desktopIcons: document.getElementById('desktop-icons'),
            windowContainer: document.getElementById('window-container'),
            taskbar: document.getElementById('taskbar'),
            taskbarApps: document.getElementById('taskbar-apps'),
            clock: document.getElementById('clock')
