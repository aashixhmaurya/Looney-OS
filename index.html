<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LooneyOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME (WIREFRAME / SKETCH STYLE)
           ========================================================================== */
        :root {
            /* Pure Black & White Wireframe Theme */
            --white: #ffffff;
            --black: #000000;
            --grey: #ffffff;
            --yellow: #ffffff;
            --red: #ffffff;
            --blue: #ffffff;
            --green: #ffffff;
            --purple: #ffffff;
            --orange: #ffffff;

            /* Sketchy styling */
            --border-width: 2px;
            --border: var(--border-width) solid var(--black);
            --shadow-solid: 4px 4px 0px var(--black);
            --shadow-hover: 6px 6px 0px var(--black);
            --shadow-active: 0px 0px 0px var(--black);

            /* Hand-drawn box effect using border-radius trick */
            --radius-sm: 2px 5px 3px 4px / 4px 2px 5px 3px;
            --radius-md: 4px 8px 5px 6px / 6px 4px 8px 5px;
            --radius-lg: 6px 12px 8px 10px / 10px 8px 12px 6px;

            /* App Theme Default */
            --bg-color: #ffffff;
            --wallpaper: #ffffff;
        }

        /* ==========================================================================
           2. GLOBAL RESETS & TYPOGRAPHY
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Architects Daughter', cursive;
            user-select: none;
            /* Prevent text selection for app-like feel */
        }

        /* Custom Text Selection (Sketchy graphite/marker feel CSS Hack) */
        ::selection {
            background-color: #999999;
            /* Rough marker grey */
            color: #000000;
            /* Black text */
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
            /* Rough edge feel */
        }

        ::-moz-selection {
            background-color: #999999;
            color: #000000;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
        }

        body {
            overflow: hidden;
            background-color: var(--white);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            touch-action: none;
            /* Prevent mobile pull-to-refresh */
            /* Custom Sketchy Default Cursor matching reference image */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M6,6 L8,28 L13,23 L18,32 L22,30 L16,21 L25,19 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M5,5 L9,29 L12,24 L17,33 L23,31 L17,22 L26,20 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/><path d='M7,7 L7,27 L14,22 L19,31 L21,29 L15,20 L24,18 Z' fill='none' stroke='black' stroke-width='1.5' stroke-linejoin='round' stroke-linecap='round'/></svg>") 6 6, default;
        }

        /* Keep text cursor normal for inputs to avoid annoying text selection */
        textarea,
        input[type="text"],
        .term-input,
        .new-folder-input {
            cursor: text !important;
        }

        /* Custom Sketchy Pointer for all clickable elements */
        button,
        .looney-btn,
        .desktop-icon,
        .taskbar-item,
        #start-btn,
        .folder,
        .cal-day:not(.empty),
        .cal-prev,
        .cal-next,
        .music-btn,
        .settings-nav-item,
        .drop-zone,
        .context-item,
        .calc-btn,
        .color-btn,
        .size-btn {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M16,16 V5 C16,3 19,3 19,5 V14 C20,13 22,13 23,14 C24,13 26,13 27,15 C28,14 30,15 30,17 V22 C30,27 26,31 21,31 C16,31 13,27 12,23 L9,20 C8,19 9,17 11,18 L14,20 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M15,15 V4 C15,2 18,2 18,4 V13 C19,12 21,12 22,13 C23,12 25,12 26,14 C27,13 29,14 29,16 V21 C29,26 25,30 20,30 C15,30 12,26 11,22 L8,19 C7,18 8,16 10,17 L13,19 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/></svg>") 16 5, pointer !important;
        }

        .sketchy-slider::-webkit-slider-thumb {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M16,16 V5 C16,3 19,3 19,5 V14 C20,13 22,13 23,14 C24,13 26,13 27,15 C28,14 30,15 30,17 V22 C30,27 26,31 21,31 C16,31 13,27 12,23 L9,20 C8,19 9,17 11,18 L14,20 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M15,15 V4 C15,2 18,2 18,4 V13 C19,12 21,12 22,13 C23,12 25,12 26,14 C27,13 29,14 29,16 V21 C29,26 25,30 20,30 C15,30 12,26 11,22 L8,19 C7,18 8,16 10,17 L13,19 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/></svg>") 16 5, pointer !important;
        }

        .sketchy-slider::-moz-range-thumb {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M16,16 V5 C16,3 19,3 19,5 V14 C20,13 22,13 23,14 C24,13 26,13 27,15 C28,14 30,15 30,17 V22 C30,27 26,31 21,31 C16,31 13,27 12,23 L9,20 C8,19 9,17 11,18 L14,20 Z' fill='white' stroke='black' stroke-width='2.5' stroke-linejoin='round' stroke-linecap='round'/><path d='M15,15 V4 C15,2 18,2 18,4 V13 C19,12 21,12 22,13 C23,12 25,12 26,14 C27,13 29,14 29,16 V21 C29,26 25,30 20,30 C15,30 12,26 11,22 L8,19 C7,18 8,16 10,17 L13,19 Z' fill='none' stroke='black' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'/></svg>") 16 5, pointer !important;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--white);
            border-left: var(--border);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--black);
        }

        /* Context Menu (Right Click) */
        #context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            /* Halka sa transparent/dim */
            border: 2px solid rgba(0, 0, 0, 0.7);
            /* Border thodi soft ki hai */
            /* Sketchy shape inspired by other apps (approx 70% rough) */
            border-radius: 15px 255px 10px 225px / 225px 10px 255px 15px;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
            /* Shadow ka highlight kaafi kam/dim kar diya */
            padding: 5px;
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 100000;
            min-width: 150px;
        }

        .context-item {
            padding: 6px 10px;
            font-size: 0.95rem;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.85);
            /* Text thoda soft rakha hai */
            border-radius: var(--radius-sm);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-item:hover {
            background: rgba(0, 0, 0, 0.05);
            /* Wo cringe kala dabba hata kar bohot halka grey daala hai */
            color: var(--black);
            transform: translateX(3px);
            /* Scale ke bajaye halka sa right me slide hoga, pencil stroke feel ke liye */
        }

        /* Icon color settings */
        .context-item svg {
            stroke: rgba(0, 0, 0, 0.85);
        }

        .context-item:hover svg {
            stroke: var(--black);
        }

        /* ==========================================================================
           3. BOOT SEQUENCE
           ========================================================================== */
        #boot-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--white);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: smoothFadeUp 1s ease-out forwards;
        }

        /* Logo CSS Recreation (Big) */
        .logo-mark {
            position: relative;
            width: 75px;
            height: 60px;
            margin-bottom: 10px;
        }

        .l-vert {
            position: absolute;
            left: 0;
            top: 0;
            width: 18px;
            height: 60px;
            background: var(--black);
            border-radius: 9px;
        }

        .l-horiz {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50px;
            height: 18px;
            background: var(--black);
            border-radius: 9px;
        }

        .l-end {
            position: absolute;
            left: 32px;
            bottom: 0;
            width: 18px;
            height: 35px;
            background: var(--black);
            border-radius: 9px;
        }

        .l-dot {
            position: absolute;
            left: 60px;
            top: 12px;
            width: 15px;
            height: 15px;
            background: var(--black);
            border-radius: 50%;
        }

        /* Mini Logo for Taskbar */
        .mini-logo {
            position: relative;
            width: 32px;
            height: 24px;
        }

        .mini-l-vert {
            position: absolute;
            left: 0;
            top: 0;
            width: 7px;
            height: 24px;
            background: var(--black);
            border-radius: 4px;
        }

        .mini-l-horiz {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 22px;
            height: 7px;
            background: var(--black);
            border-radius: 4px;
        }

        .mini-l-end {
            position: absolute;
            left: 15px;
            bottom: 0;
            width: 7px;
            height: 14px;
            background: var(--black);
            border-radius: 4px;
        }

        .mini-l-dot {
            position: absolute;
            left: 26px;
            top: 3px;
            width: 6px;
            height: 6px;
            background: var(--black);
            border-radius: 50%;
        }

        .logo-text {
            font-family: serif;
            font-size: 3.5rem;
            letter-spacing: 3px;
            color: var(--black);
            font-weight: bold;
        }

        @keyframes smoothFadeUp {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ==========================================================================
           4. DESKTOP
           ========================================================================== */
        #desktop {
            flex: 1;
            position: relative;
            background-color: var(--white);
            overflow: hidden;
            display: none;
            /* Hidden until boot finishes */
            z-index: 1;
        }

        /* Pure sketch theme filter applied exactly to the background */
        #desktop::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--wallpaper);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0.9;
            /* Slight fade for paper/sketch feel */
            pointer-events: none;
        }

        #desktop-icons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            padding: 1rem;
            height: 100%;
            align-content: start;
            /* Allow absolute icons to escape the grid flow visually */
            position: relative;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            /* Z-index base for dragging */
            z-index: 1;
        }

        .desktop-icon:hover {
            transform: scale(1.05) translateY(-5px);
        }

        .desktop-icon:active {
            transform: scale(0.95);
            /* Apply scale to parent instead of emoji to keep custom shapes */
        }

        .desktop-icon .emoji {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            /* Base border, we will randomly alter shapes below */
            border: 2px solid var(--black);
            background-color: var(--white);
            margin-bottom: 5px;
            transition: transform 0.2s;
            box-shadow: 2px 2px 0px var(--black);
            pointer-events: none;
            /* Make drag easier by preventing inner elements from stealing focus */
        }

        /* Har box ko image ki tarah alag-alag (random sketch) shape dena */
        .desktop-icon:nth-child(1) .emoji {
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            transform: skewX(-3deg);
        }

        .desktop-icon:nth-child(2) .emoji {
            border-radius: 15px 255px 10px 225px / 225px 10px 255px 15px;
            transform: skewY(3deg);
        }

        .desktop-icon:nth-child(3) .emoji {
            border-radius: 225px 15px 255px 10px / 15px 255px 10px 225px;
            transform: skewX(2deg) rotate(2deg);
        }

        .desktop-icon:nth-child(4) .emoji {
            border-radius: 15px 225px 15px 255px / 255px 15px 225px 15px;
            transform: rotate(-2deg);
        }

        .desktop-icon:nth-child(5) .emoji {
            border-radius: 255px 20px 225px 10px / 20px 225px 10px 255px;
            transform: skewY(-2deg) skewX(2deg);
        }

        .desktop-icon:nth-child(6) .emoji {
            border-radius: 10px 255px 15px 225px / 225px 15px 255px 10px;
            transform: skewX(-2deg) rotate(-1deg);
        }

        .desktop-icon:nth-child(7) .emoji {
            border-radius: 20px 255px 10px 225px / 255px 10px 225px 20px;
            transform: skewY(1deg);
        }

        .desktop-icon:nth-child(8) .emoji {
            border-radius: 255px 10px 225px 20px / 10px 225px 20px 255px;
            transform: skewX(1deg);
        }

        /* SVG styling for hand-drawn sketch look */
        .desktop-icon .emoji svg {
            width: 32px;
            height: 32px;
            stroke: var(--black);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .desktop-icon span {
            color: var(--black);
            font-size: 1rem;
            font-weight: bold;
            margin-top: 4px;
            background: transparent;
            border: none;
            box-shadow: none;
            pointer-events: none;
        }

        /* ==========================================================================
           5. WINDOW SYSTEM
           ========================================================================== */
        .window {
            position: absolute;
            width: 450px;
            max-width: 95vw;
            height: 350px;
            max-height: calc(100vh - 80px);
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
            /* Hand-drawn line effect */
            box-shadow: var(--shadow-solid);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(1);
            opacity: 1;
            animation: windowPop 0.3s ease-out backwards;
            min-width: 300px;
            min-height: 200px;
        }

        .window.closing {
            animation: windowClose 0.2s ease-in forwards !important;
            pointer-events: none;
        }

        .window.maximized {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            border-radius: 0;
            box-shadow: none;
            transition: all 0.2s ease;
        }

        .window.minimized {
            opacity: 0;
            pointer-events: none;
            transform: translateY(50px) scale(0.8);
            transition: all 0.2s ease;
        }

        @keyframes windowPop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes windowClose {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(0.8);
                opacity: 0;
            }
        }

        .window-header {
            background: var(--white) !important;
            border-bottom: 2px solid var(--black);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            color: var(--black) !important;
        }

        .window-header:active {
            cursor: grabbing;
        }

        .window-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--black) !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-title svg {
            width: 20px;
            height: 20px;
            stroke: var(--black);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .window-content {
            flex: 1;
            background: var(--white);
            position: relative;
            overflow: auto;
            display: flex;
            flex-direction: column;
            color: var(--black);
        }

        /* Resizer handle ka design */
        .resize-handle {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            cursor: se-resize;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==========================================================================
           6. TASKBAR
           ========================================================================== */
        #taskbar {
            height: 60px;
            background: var(--white);
            border-top: 3px solid var(--black);
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 999;
            display: none;
            transition: background-color 0.2s, border-width 0.2s;
        }

        /* Drag-to-minimize indication */
        #taskbar.drag-over {
            background-color: #e0e0e0;
            border-top-width: 6px;
        }

        #start-btn {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 5px 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--black);
        }

        #start-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--black);
        }

        #start-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }

        #taskbar-apps {
            display: flex;
            flex: 1;
            gap: 10px;
            margin-left: 15px;
            margin-right: 15px;
            /* Clock se thodi doori banaye rakhne ke liye */
            overflow-x: auto;
            scrollbar-width: none;
            /* Firefox me scrollbar chhupane ke liye */
        }

        #taskbar-apps::-webkit-scrollbar {
            display: none;
            /* Chrome/Edge/Safari me ajeeb scrollbar line chhupane ke liye */
        }

        .taskbar-item {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 5px 10px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            display: flex;
            align-items: center;
            gap: 5px;
            max-width: 150px;
            flex: 0 1 auto;
            /* Jagah kam hone par smoothly sikudne (shrink) ke liye */
            min-width: 36px;
            /* Icon hamesha bacha rahega chahe kitna bhi chhota ho */
            color: var(--black);
        }

        .taskbar-item svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            flex-shrink: 0;
            /* Icon kabhi nahi sikudega */
        }

        .taskbar-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /* Shrink hone pe automatically "..." lagane ke liye */
        }

        .taskbar-item.active {
            background: var(--black);
            color: var(--white);
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        #clock {
            background: var(--white);
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 5px 15px;
            font-weight: bold;
            box-shadow: 2px 2px 0px var(--black);
            color: var(--black);
            letter-spacing: 2px;
            /* Added spacing to fix congested digits */
        }

        /* ==========================================================================
           7. APP SPECIFIC STYLES
           ========================================================================== */

        /* Reusable UI Elements */
        .looney-btn {
            background: var(--white);
            color: var(--black);
            border: 2px solid var(--black);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: var(--radius-sm);
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: all 0.1s;
        }

        .looney-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--black);
        }

        .looney-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }

        /* Notepad */
        .app-notepad {
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 10px;
        }

        .app-notepad textarea {
            flex: 1;
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            padding: 10px;
            font-size: 1.1rem;
            resize: none;
            background: var(--white);
            color: var(--black);
            /* Lined paper effect */
            background-image: repeating-linear-gradient(transparent, transparent 24px, #ddd 24px, #ddd 25px);
            line-height: 25px;
        }

        .app-notepad .toolbar {
            display: flex;
            justify-content: flex-end;
        }

        /* Terminal */
        .app-terminal {
            background: var(--white);
            color: var(--black);
            font-family: monospace;
            padding: 10px;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .app-terminal .output {
            flex: 1;
            display: flex;
            flex-direction: column;
            font-family: monospace;
        }

        .app-terminal .input-line {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .app-terminal .prompt {
            color: var(--black);
            margin-right: 10px;
            font-family: monospace;
            font-weight: bold;
        }

        .app-terminal input {
            background: transparent;
            border: none;
            color: var(--black);
            font-family: monospace;
            font-size: 1rem;
            flex: 1;
            outline: none;
        }

        /* Doodle Pad */
        .app-doodle {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 10px;
            gap: 10px;
        }

        .doodle-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        .doodle-viewport {
            flex: 1;
            overflow: hidden;
            border: 2px solid var(--black);
            border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
            /* Sketchy desk texture */
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 0, 0, 0.03) 10px, rgba(0, 0, 0, 0.03) 12px);
            position: relative;
        }

        .doodle-canvas {
            background: var(--white);
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
            cursor: crosshair;
        }

        /* New Tools CSS for Doodle Pad */
        .doodle-palette {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-btn {
            width: 22px;
            height: 22px;
            border: 2px solid var(--black);
            /* Imperfect circle instead of perfect 50% */
            border-radius: 45% 55% 40% 60% / 55% 45% 60% 40%;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: transform 0.1s;
        }

        .color-btn.active {
            transform: scale(1.2);
            border-width: 3px;
            box-shadow: 1px 1px 0px var(--black);
        }

        /* Naked sketchy dot buttons for brush size */
        .size-btn {
            background: transparent;
            border: 2px solid var(--black);
            cursor: pointer;
            border-radius: 50% 40% 60% 40% / 40% 60% 50% 50%;
            box-shadow: 2px 2px 0px var(--black);
            transition: all 0.1s;
            padding: 0;
            margin: 0 4px;
        }

        .size-btn.active {
            background: var(--black);
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        /* Calculator */
        .app-calc {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 15px;
            background: var(--white);
        }

        .calc-display {
            height: 65px;
            /* Halka sa height bada diya hai */
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            margin-bottom: 15px;
            font-size: 2rem;
            padding: 10px 15px;
            font-family: 'Architects Daughter', cursive;
            background: #f9f9f9;
            box-shadow: inset 2px 2px 0px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            /* Text ko vertical center aur right me align karne ka fix */
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex: 1;
        }

        .calc-btn {
            background: var(--white);
            border: 2px solid var(--black);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: all 0.1s;
            font-family: 'Architects Daughter', cursive;
            font-weight: bold;
        }

        /* Random sketchy borders for calc buttons */
        .calc-btn:nth-child(even) {
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
        }

        .calc-btn:nth-child(odd) {
            border-radius: 15px 255px 10px 225px / 225px 10px 255px 15px;
        }

        .calc-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }

        /* Files App Update */
        .files-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border-bottom: 2px solid var(--black);
            background: var(--white);
        }

        .files-path {
            flex: 1;
            font-weight: bold;
            color: var(--black);
            font-size: 0.85rem;
        }

        .files-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
            transition: background 0.2s;
        }

        .empty-folder {
            padding: 20px;
            text-align: center;
            color: var(--black);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        .new-folder-btn .icon {
            border-style: dashed !important;
        }

        .new-folder-input {
            width: 100%;
            max-width: 80px;
            padding: 2px 5px;
            text-align: center;
            font-family: inherit;
            font-size: 0.9rem;
            border: 2px solid var(--black);
            border-radius: var(--radius-sm);
            margin-top: 5px;
            outline: none;
            background: var(--white);
            color: var(--black);
        }

        .folder {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }

        .folder .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border: 2px solid var(--black);
            background-color: var(--white);
            transition: transform 0.2s;
            box-shadow: 2px 2px 0px var(--black);
            overflow: hidden;
        }

        .folder .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%);
        }

        /* Folder boxes ko bhi thoda sketchy randomness diya */
        .folder:nth-child(odd) .icon {
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            transform: skewX(-2deg);
        }

        .folder:nth-child(even) .icon {
            border-radius: 15px 255px 10px 225px / 225px 10px 255px 15px;
            transform: skewY(2deg);
        }

        .folder:nth-child(3n) .icon {
            border-radius: 225px 15px 255px 10px / 15px 255px 10px 225px;
            transform: skewX(2deg) rotate(1deg);
        }

        .folder .icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--black);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .folder:hover .icon {
            transform: scale(1.05);
        }

        .folder span {
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 5px;
            color: var(--black);
        }

        /* Calendar */
        .app-calendar {
            padding: 15px;
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            flex: 1;
        }

        .cal-day-name {
            font-weight: bold;
            color: var(--black);
            border-bottom: 2px solid var(--black);
            margin-bottom: 5px;
            padding-bottom: 5px;
        }

        .cal-day {
            background: var(--white);
            border: 1px solid var(--black);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 2px 2px 0px var(--black);
            transition: transform 0.1s;
        }

        .cal-day:hover {
            transform: scale(1.1);
            background: var(--white);
            z-index: 2;
            border-width: 2px;
        }

        .cal-day.today {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .cal-day.empty {
            background: transparent;
            border: none;
            box-shadow: none;
        }

        /* Settings */
        .app-settings {
            padding: 0;
            display: flex;
            flex-direction: row;
            height: 100%;
        }

        /* UI layout reset */

        /* Settings Navigation Sidebar */
        .settings-nav-item {
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            transition: all 0.2s;
            margin-bottom: 5px;
            color: var(--black);
        }

        .settings-nav-item:hover {
            border-color: var(--black);
        }

        /* Custom Range Slider for Volume (Sketchy Hand-drawn Style) */
        .sketchy-slider {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            outline: none;
            cursor: pointer;
            height: 30px;
        }

        .sketchy-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            /* Hand-drawn tapered pencil stroke using SVG (Flipped) */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 10" preserveAspectRatio="none"><path d="M 300,5 Q 250,3 200,5 T 100,4 Q 50,6 0,1 L 20,3 Q 100,7 200,8 Q 250,7 300,8 Z" fill="black"/></svg>') no-repeat center;
            background-size: 100% 100%;
            border: none;
            box-shadow: none;
        }

        .sketchy-slider::-moz-range-track {
            width: 100%;
            height: 12px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 10" preserveAspectRatio="none"><path d="M 300,5 Q 250,3 200,5 T 100,4 Q 50,6 0,1 L 20,3 Q 100,7 200,8 Q 250,7 300,8 Z" fill="black"/></svg>') no-repeat center;
            background-size: 100% 100%;
            border: none;
            box-shadow: none;
        }

        .sketchy-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            /* Hand-drawn overlapping circle SVG, transparent inside */
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M 30 20 C 5 35 15 80 50 85 C 85 90 95 45 75 20 C 55 -5 20 15 15 45' fill='none' stroke='black' stroke-width='10' stroke-linecap='round'/></svg>") no-repeat center;
            background-color: transparent;
            border: none;
            border-radius: 0;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: none;
        }

        .sketchy-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M 30 20 C 5 35 15 80 50 85 C 85 90 95 45 75 20 C 55 -5 20 15 15 45' fill='none' stroke='black' stroke-width='10' stroke-linecap='round'/></svg>") no-repeat center;
            background-color: transparent;
            border: none;
            border-radius: 0;
            cursor: pointer;
            box-shadow: none;
        }

        /* Drag and Drop Wallpaper Zone */
        .drop-zone {
            border: 2px dashed var(--black);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            background: var(--white);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            font-weight: bold;
            color: var(--black);
            /* Wireframe diagonal shading */
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 0, 0, 0.05) 10px, rgba(0, 0, 0, 0.05) 12px);
        }

        .drop-zone:hover {
            background-color: #f9f9f9;
        }

        .drop-zone.dragover {
            background-color: #eee;
            border-color: var(--black);
            transform: scale(1.02);
            box-shadow: 4px 4px 0px var(--black);
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        /* Music Player */
        .app-music {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: var(--white);
            padding: 20px;
            text-align: center;
        }

        .record-player {
            width: 150px;
            height: 150px;
            background: var(--white);
            border-radius: 50%;
            border: 2px dashed var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            background-image:
                linear-gradient(to bottom right, transparent calc(50% - 1px), var(--black) calc(50% - 1px), var(--black) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(to top right, transparent calc(50% - 1px), var(--black) calc(50% - 1px), var(--black) calc(50% + 1px), transparent calc(50% + 1px));
        }

        .record-label {
            display: none;
        }

        .record-hole {
            display: none;
        }

        .spin {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .music-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .music-btn {
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--white);
            border: 2px solid var(--black);
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--black);
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--black);
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: #eee;
        }

        .music-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }

        .track-info {
            font-weight: bold;
            background: var(--white);
            border: 2px solid var(--black);
            padding: 5px 15px;
            border-radius: var(--radius-sm);
            margin-top: 15px;
        }

        /* ==========================================================================
           8. DRAG INDICATORS (GESTURE ZONES)
           ========================================================================== */
        .drag-indicator {
            position: absolute;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            border: 2px dashed var(--black);
            border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
            /* Sketchy shape */
        }

        .drag-indicator.active {
            opacity: 1;
        }

        /* Maximize full screen preview zone */
        #indicator-max {
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transform: scale(0.98);
            background: repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(0, 0, 0, 0.03) 15px, rgba(0, 0, 0, 0.03) 18px);
        }

        #indicator-max.active {
            transform: scale(1);
        }

        /* Close corner preview zone */
        #indicator-close {
            top: 10px;
            right: 10px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.8);
            background-color: var(--white);
            box-shadow: 4px 4px 0px var(--black);
        }

        #indicator-close.active {
            transform: scale(1);
            background-color: #eaeaea;
        }

        /* ==========================================================================
           9. GLOBAL DROP OVERLAY
           ========================================================================== */
        #global-drop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            z-index: 5;
            /* Lowered so it doesn't block window drop events */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--black);
            border: 8px dashed var(--black);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #global-drop-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

            calc: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="8" y1="12" x2="16" y2="12"></line><line x1="12" y1="8" x2="12" y2="16"></line></svg>`,
            doodle: `<svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>`
        };

        const state = {
            apps: {
                files: { id: 'files', title: 'My Files', icon: icons.files, color: 'var(--yellow)' },
                doodle: { id: 'doodle', title: 'Doodle Pad', icon: icons.doodle, color: 'var(--purple)' },
                calc: { id: 'calc', title: 'Calculator', icon: icons.calc, color: 'var(--green)' },
                terminal: { id: 'terminal', title: 'Terminal', icon: icons.terminal, color: 'var(--black)' },
                music: { id: 'music', title: 'Music Player', icon: icons.music, color: 'var(--orange)' },
                notepad: { id: 'notepad', title: 'Notepad', icon: icons.notepad, color: 'var(--blue)' },
                calendar: { id: 'calendar', title: 'Calendar', icon: icons.calendar, color: 'var(--red)' },
                settings: { id: 'settings', title: 'Settings', icon: icons.settings, color: 'var(--grey)' }
            },
            openWindows: {},
            zIndexCounter: 10,
            activeAppId: null
        };

        let windowSizes = {};
        try {
            const savedSizes = localStorage.getItem('looney_window_sizes');
            if (savedSizes) windowSizes = JSON.parse(savedSizes);

        // Desktop icon positions object
        let savedIconPositions = {};
        try {
            const savedIcons = localStorage.getItem('looney_icon_positions');
            if (savedIcons) savedIconPositions = JSON.parse(savedIcons);
        } catch (e) { }

        const elements = {
            bootScreen: document.getElementById('boot-screen'),
            desktop: document.getElementById('desktop'),
            desktopIcons: document.getElementById('desktop-icons'),
            windowContainer: document.getElementById('window-container'),

            taskbarApps: document.getElementById('taskbar-apps'),
            clock: document.getElementById('clock')
        };

        /* ==========================================================================
           2. BOOT SEQUENCE
           ========================================================================== */

        async function runBoot() {
            await sleep(2000);
            elements.bootScreen.style.opacity = "0";

            setTimeout(() => {
                elements.bootScreen.style.display = 'none';
                elements.desktop.style.display = 'block';
                elements.taskbar.style.display = 'flex';
                initOS();
            }, 800);
        }

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        /* ==========================================================================
           3. OS INITIALIZATION
           ========================================================================== */
        function initOS() {
            renderDesktopIcons();
            startClock();

            const ctxMenu = document.getElementById('context-menu');

            // Hide context menu on normal click
            document.addEventListener('click', () => {
                ctxMenu.style.display = 'none';
            });

            // Show custom context menu on desktop right-click
            elements.desktop.addEventListener('contextmenu', (e) => {
                e.preventDefault();

                // Show menu only if clicked directly on desktop or icons container
                if (e.target === elements.desktop || e.target === elements.desktopIcons) {
                    ctxMenu.style.display = 'flex';

                    let x = e.clientX;
                    let y = e.clientY;

                    // Prevent menu from going off-screen
                    if (x + ctxMenu.offsetWidth > window.innerWidth) x -= ctxMenu.offsetWidth;
                    if (y + ctxMenu.offsetHeight > window.innerHeight) y -= ctxMenu.offsetHeight;

                    ctxMenu.style.left = `${x}px`;
                    ctxMenu.style.top = `${y}px`;
                }
            });

            // Context Menu Actions
            document.getElementById('ctx-refresh').addEventListener('click', () => {
                elements.desktop.style.opacity = '0';
                setTimeout(() => elements.desktop.style.opacity = '1', 200);
            });

            document.getElementById('ctx-note').addEventListener('click', () => {
                openApp('notepad');
            });

            document.getElementById('ctx-settings').addEventListener('click', () => {
                openApp('settings');
            });

            document.getElementById('start-btn').addEventListener('click', () => {
                let anyOpen = false;
                Object.values(state.openWindows).forEach(winData => {
                    if (!winData.minimized) anyOpen = true;
                });

                Object.keys(state.openWindows).forEach(appId => {
                    if (anyOpen) {
                        minimizeApp(appId);
                    } else {
                        const winData = state.openWindows[appId];
                        if (winData.lastTop) {
                            winData.element.style.top = winData.lastTop;
                            winData.element.style.left = winData.lastLeft;
                        }
                        winData.element.classList.remove('minimized');
                        winData.minimized = false;
                        focusWindow(appId);
                    }
                });
            });
        }

        function renderDesktopIcons() {
            elements.desktopIcons.innerHTML = '';
            Object.values(state.apps).forEach(app => {
                const icon = document.createElement('div');
                icon.className = 'desktop-icon';
                icon.innerHTML = `
                    <div class="emoji">${app.icon}</div>
                    <span>${app.title}</span>
                `;

                // Apply saved absolute position if available
                if (savedIconPositions[app.id]) {
                    icon.style.position = 'absolute';
                    icon.style.left = savedIconPositions[app.id].left;
                    icon.style.top = savedIconPositions[app.id].top;
                    icon.style.width = '100px'; // Lock width when absolute
                }

                makeIconDraggable(icon, app.id);
                elements.desktopIcons.appendChild(icon);
            });
        }

        function startClock() {
            // System se user ka desh aur timezone (location) detect karna
            const detectedTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            setInterval(() => {
                const now = new Date();
                // Exact location (timezone) ke hisaab se time show karna, par UI English mein rakhna
                elements.clock.textContent = new Intl.DateTimeFormat('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZone: detectedTimeZone
                }).format(now);
            }, 1000);
        }

        // --- Draggable Home Screen Icons Logic ---
        function makeIconDraggable(iconElement, appId) {
            let isDragging = false;
            let startX, startY;
            let initialLeft, initialTop;

            function handleDown(e) {
                if (e.type === 'mousedown' && e.button !== 0) return;

                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }
                isDragging = false;
                iconElement.style.transition = 'none'; // Smooth drag ke liye

                document.addEventListener('mousemove', handleMove);
                document.addEventListener('touchmove', handleMove, { passive: false });
                document.addEventListener('mouseup', handleUp);
                document.addEventListener('touchend', handleUp);
            }

            function handleMove(e) {
                let currentX, currentY;
                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }

                // If moved more than 5 pixels, consider it a drag
                if (!isDragging && (Math.abs(currentX - startX) > 5 || Math.abs(currentY - startY) > 5)) {
                    isDragging = true;
                    iconElement.style.zIndex = 5; // Bring to front while dragging

                    if (iconElement.style.position !== 'absolute') {
                        const rect = iconElement.getBoundingClientRect();
                        iconElement.style.position = 'absolute';
                        iconElement.style.width = '100px';
                        iconElement.style.left = rect.left + 'px';
                        iconElement.style.top = rect.top + 'px';

                        initialLeft = rect.left;
                        initialTop = rect.top;
                    } else {
                        initialLeft = parseFloat(iconElement.style.left) || 0;
                        initialTop = parseFloat(iconElement.style.top) || 0;
                    }
                }

                if (isDragging) {
                    e.preventDefault();

                    let newLeft = initialLeft + (currentX - startX);
                    let newTop = initialTop + (currentY - startY);

                    // Boundaries: Icon screen se bahar na jaye
                    let maxLeft = Math.max(0, window.innerWidth - iconElement.offsetWidth);
                    let maxTop = Math.max(0, window.innerHeight - iconElement.offsetHeight - 60);

                    if (newLeft < 0) newLeft = 0;
                    if (newLeft > maxLeft) newLeft = maxLeft;
                    if (newTop < 0) newTop = 0;
                    if (newTop > maxTop) newTop = maxTop;

                    iconElement.style.left = newLeft + 'px';
                    iconElement.style.top = newTop + 'px';
                }
            }

            function handleUp(e) {
                document.removeEventListener('mousemove', handleMove);
                document.removeEventListener('touchmove', handleMove);
                document.removeEventListener('mouseup', handleUp);
                document.removeEventListener('touchend', handleUp);

                if (isDragging) {
                    iconElement.style.zIndex = '1';

                    // Bounce animation effect
                    iconElement.style.transition = 'left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

                    let safeLeft = parseFloat(iconElement.style.left) || 0;
                    let safeTop = parseFloat(iconElement.style.top) || 0;

                    // Hitbox chhota kar diya hai (60x70) taaki thoda paas rakhne pe bhi overlap trigger na ho
                    const hitWidth = 60;
                    const hitHeight = 70;

                    let hasOverlap = true;
                    let maxTries = 15;
                    const allIcons = Array.from(document.querySelectorAll('.desktop-icon')).filter(i => i !== iconElement);

                    while (hasOverlap && maxTries > 0) {
                        hasOverlap = false;
                        for (let other of allIcons) {
                            let oLeft = parseFloat(other.style.left);
                            let oTop = parseFloat(other.style.top);

                            if (isNaN(oLeft) || isNaN(oTop)) {
                                const r = other.getBoundingClientRect();
                                oLeft = r.left;
                                oTop = r.top;
                            }

                            let c1x = safeLeft + 50;
                            let c1y = safeTop + 50;
                            let c2x = oLeft + 50;
                            let c2y = oTop + 50;

                            // Distance-based accurate check
                            if (Math.abs(c1x - c2x) < hitWidth && Math.abs(c1y - c2y) < hitHeight) {
                                hasOverlap = true;
                                safeLeft += 80; // Resist effect

                                if (safeLeft > window.innerWidth - 100) {
                                    safeLeft = 20;
                                    safeTop += 90;
                                }
                                if (safeTop > window.innerHeight - 100 - 70) {
                                    safeTop = 20;
                                }
                                break;
                            }
                        }
                        maxTries--;
                    }

                    iconElement.style.left = safeLeft + 'px';
                    iconElement.style.top = safeTop + 'px';

                    savedIconPositions[appId] = {
                        left: iconElement.style.left,
                        top: iconElement.style.top
                    };
                    try {
                        localStorage.setItem('looney_icon_positions', JSON.stringify(savedIconPositions));
                    } catch (err) { }

                    setTimeout(() => {
                        iconElement.style.transition = 'transform 0.2s, box-shadow 0.2s';
                    }, 300);

                } else {
                    iconElement.style.transition = 'transform 0.2s, box-shadow 0.2s';
                    openApp(appId);
                }
            }

            iconElement.addEventListener('mousedown', handleDown);
            iconElement.addEventListener('touchstart', handleDown, { passive: true });
        }


        /* ==========================================================================
           4. WINDOW MANAGEMENT
           ========================================================================== */
        function openApp(appId) {
            const app = state.apps[appId];

            if (state.openWindows[appId]) {
                const winData = state.openWindows[appId];
                const win = winData.element;
                if (winData.lastTop) {
                    win.style.top = winData.lastTop;
                    win.style.left = winData.lastLeft;
                }
                win.classList.remove('minimized');
                winData.minimized = false;
                focusWindow(appId);
                updateTaskbar();
                return;
            }

            const win = document.createElement('div');
            win.className = 'window';

            if (windowSizes[appId]) {
                win.style.width = windowSizes[appId].width + 'px';
                win.style.height = windowSizes[appId].height + 'px';
            }

            const offset = Object.keys(state.openWindows).length * 30;
            const initialTop = `${50 + offset}px`;
            const initialLeft = `${100 + offset}px`;
            win.style.top = initialTop;
            win.style.left = initialLeft;

            const headerColor = app.color;
            const headerText = app.title;

            win.innerHTML = `
                <div class="window-header" style="background: ${headerColor};">
                    <div class="window-title">${app.icon} ${headerText}</div>
                </div>
                <div class="window-content content-hook" style="display:flex; flex-direction:column; height:100%;"></div>
                <div class="resize-handle">
                    <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; stroke: var(--black); stroke-width: 2.5; stroke-linecap: round;">
                        <line x1="14" y1="20" x2="20" y2="14"></line>
                        <line x1="8" y1="20" x2="20" y2="8"></line>
                    </svg>
                </div>
            `;

            elements.windowContainer.appendChild(win);

            state.openWindows[appId] = {
                element: win,
                maximized: false,
                minimized: false,
                lastTop: initialTop,
                lastLeft: initialLeft
            };

            const contentContainer = win.querySelector(`.content-hook`);
            populateAppContent(appId, contentContainer);

            win.addEventListener('mousedown', () => focusWindow(appId));
            win.addEventListener('touchstart', () => focusWindow(appId), { passive: true });

            makeDraggable(win, win.querySelector('.window-header'), appId);
            makeResizable(win, win.querySelector('.resize-handle'), appId);

            focusWindow(appId);
            updateTaskbar();
        }

        function closeApp(appId) {
            const winData = state.openWindows[appId];
            if (!winData) return;

            const win = winData.element;
            win.classList.add('closing');

            if (appId === 'music') stopMusic();

            delete state.openWindows[appId];
            if (state.activeAppId === appId) state.activeAppId = null;
            updateTaskbar();

            setTimeout(() => {
                win.remove();
            }, 300);
        }

        function maximizeApp(appId) {
            const winData = state.openWindows[appId];
            if (!winData) return;
            const win = winData.element;
            if (winData.maximized) {
                win.classList.remove('maximized');
                winData.maximized = false;
            } else {
                win.classList.add('maximized');
                winData.maximized = true;
            }
            focusWindow(appId);
        }

        function minimizeApp(appId) {
            const winData = state.openWindows[appId];
            if (!winData) return;
            winData.element.classList.add('minimized');
            winData.minimized = true;
            updateTaskbar();
        }

        function focusWindow(appId) {
            state.zIndexCounter++;
            const winData = state.openWindows[appId];
            if (!winData) return;
            const win = winData.element;
            win.style.zIndex = state.zIndexCounter;
            state.activeAppId = appId;
            updateTaskbar();
        }

        function updateTaskbar() {
            elements.taskbarApps.innerHTML = '';
            Object.keys(state.openWindows).forEach(appId => {
                const appData = state.apps[appId];
                const winData = state.openWindows[appId];

                const taskItem = document.createElement('div');
                taskItem.className = `taskbar-item ${state.activeAppId === appId && !winData.minimized ? 'active' : ''}`;
                // Title ko span me daala taaki shrink aur ellipsis perfectly kaam kare
                taskItem.innerHTML = `${appData.icon} <span>${appData.title}</span>`;

                let isDragging = false;
                let startX, startY;
                let clone = null;

                function handlePointerDown(e) {
                    if (e.type === 'mousedown' && e.button !== 0) return;

                    if (e.type === 'touchstart') {
                        startX = e.touches[0].clientX;
                        startY = e.touches[0].clientY;
                    } else {
                        startX = e.clientX;
                        startY = e.clientY;
                    }
                    isDragging = false;

                    document.addEventListener('mousemove', handlePointerMove);
                    document.addEventListener('touchmove', handlePointerMove, { passive: false });
                    document.addEventListener('mouseup', handlePointerUp);
                    document.addEventListener('touchend', handlePointerUp);
                }

                function handlePointerMove(e) {
                    let currentX, currentY;
                    if (e.type === 'touchmove') {
                        currentX = e.touches[0].clientX;
                        currentY = e.touches[0].clientY;
                    } else {
                        currentX = e.clientX;
                        currentY = e.clientY;
                    }

                    if (!isDragging && (Math.abs(currentX - startX) > 10 || Math.abs(currentY - startY) > 10)) {
                        isDragging = true;

                        clone = taskItem.cloneNode(true);
                        clone.style.position = 'fixed';
                        clone.style.zIndex = '100000';
                        clone.style.pointerEvents = 'none';
                        clone.style.opacity = '0.7';
                        clone.style.transform = 'rotate(-5deg)';
                        clone.style.boxShadow = '6px 6px 0px var(--black)';
                        clone.style.margin = '0';
                        document.body.appendChild(clone);
                    }

                    if (isDragging && clone) {
                        e.preventDefault();
                        clone.style.left = (currentX - clone.offsetWidth / 2) + 'px';
                        clone.style.top = (currentY - clone.offsetHeight / 2) + 'px';

                        const indClose = document.getElementById('indicator-close');
                        if (currentY < window.innerHeight - 80) {
                            indClose.classList.add('active');
                        } else {
                            indClose.classList.remove('active');
                        }
                    }
                }

                function handlePointerUp(e) {
                    document.removeEventListener('mousemove', handlePointerMove);
                    document.removeEventListener('touchmove', handlePointerMove);
                    document.removeEventListener('mouseup', handlePointerUp);
                    document.removeEventListener('touchend', handlePointerUp);

                    const indClose = document.getElementById('indicator-close');
                    indClose.classList.remove('active');

                    if (isDragging) {
                        let currentY;
                        if (e.type === 'touchend' && e.changedTouches.length > 0) {
                            currentY = e.changedTouches[0].clientY;
                        } else {
                            currentY = e.clientY;
                        }

                        if (currentY < window.innerHeight - 80) {
                            closeApp(appId);
                        }

                        if (clone) {
                            clone.remove();
                            clone = null;
                        }
                    } else {
                        if (state.activeAppId === appId && !winData.minimized) {
                            minimizeApp(appId);
                        } else {
                            if (winData.lastTop) {
                                winData.element.style.top = winData.lastTop;
                                winData.element.style.left = winData.lastLeft;
                            }
                            state.openWindows[appId].element.classList.remove('minimized');
                            state.openWindows[appId].minimized = false;
                            focusWindow(appId);
                        }
                    }
                }

                taskItem.addEventListener('mousedown', handlePointerDown);
                taskItem.addEventListener('touchstart', handlePointerDown, { passive: true });

                elements.taskbarApps.appendChild(taskItem);
            });
        }

        // --- Dragging Logic with Gesture Zones (Supports Mouse & Touch) ---
        function makeDraggable(element, handle, appId) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            let dragAction = null;

            handle.onmousedown = dragStart;
            handle.ontouchstart = dragStart;

            function dragStart(e) {
                e.preventDefault();

                if (element.classList.contains('maximized')) {
                    element.classList.remove('maximized');
                    state.openWindows[appId].maximized = false;

                    element.style.width = (windowSizes[appId] ? windowSizes[appId].width : 450) + 'px';
                    element.style.height = (windowSizes[appId] ? windowSizes[appId].height : 350) + 'px';

                    let clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                    let newLeft = clientX - (parseInt(element.style.width) / 2);
                    if (newLeft < 0) newLeft = 0;
                    if (newLeft > window.innerWidth - parseInt(element.style.width)) newLeft = window.innerWidth - parseInt(element.style.width);

                    element.style.left = newLeft + 'px';
                    element.style.top = '10px';

                    state.openWindows[appId].lastTop = '10px';
                    state.openWindows[appId].lastLeft = newLeft + 'px';
                } else {
                    state.openWindows[appId].lastTop = element.style.top;
                    state.openWindows[appId].lastLeft = element.style.left;
                }

                if (e.type === 'touchstart') {
                    pos3 = e.touches[0].clientX;
                    pos4 = e.touches[0].clientY;
                } else {
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                }

                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDrag;
                window.addEventListener('blur', closeDragElement);

                element.style.transition = 'none';
            }

            function elementDrag(e) {
                e.preventDefault();

                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;

                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";

                const indMax = document.getElementById('indicator-max');
                const indClose = document.getElementById('indicator-close');
                const taskbar = document.getElementById('taskbar');

                dragAction = null;
                indMax.classList.remove('active');
                indClose.classList.remove('active');
                taskbar.classList.remove('drag-over');

                if (clientY < 150 && clientX > window.innerWidth - 150) {
                    dragAction = 'close';
                    indClose.classList.add('active');
                } else if (clientY < 50) {
                    dragAction = 'max';
                    indMax.classList.add('active');
                } else if (clientY > window.innerHeight - 100) {
                    dragAction = 'min';
                    taskbar.classList.add('drag-over');
                }
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
                window.removeEventListener('blur', closeDragElement);

                element.style.transition = '';

                document.getElementById('indicator-max').classList.remove('active');
                document.getElementById('indicator-close').classList.remove('active');
                document.getElementById('taskbar').classList.remove('drag-over');

                if (dragAction === 'close') {
                    closeApp(appId);
                } else if (dragAction === 'max') {
                    maximizeApp(appId);
                } else if (dragAction === 'min') {
                    element.style.top = state.openWindows[appId].lastTop || '50px';
                    element.style.left = state.openWindows[appId].lastLeft || '100px';
                    minimizeApp(appId);
                }

                dragAction = null;
            }
        }

        // --- Window Resizing Logic ---
        function makeResizable(element, handle, appId) {
            let startX, startY, startWidth, startHeight;

            function initResize(e) {
                e.preventDefault();
                e.stopPropagation();

                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }

                startWidth = parseInt(document.defaultView.getComputedStyle(element).width, 10);
                startHeight = parseInt(document.defaultView.getComputedStyle(element).height, 10);

                // Full screen hone par agar resize karein, toh smoothly normal mode me aa jaye
                if (element.classList.contains('maximized')) {
                    element.classList.remove('maximized');
                    state.openWindows[appId].maximized = false;
                    element.style.width = startWidth + 'px';
                    element.style.height = startHeight + 'px';
                    element.style.top = '0px';
                    element.style.left = '0px';
                    state.openWindows[appId].lastTop = '0px';
                    state.openWindows[appId].lastLeft = '0px';
                }

                document.addEventListener('mousemove', resize);
                document.addEventListener('touchmove', resize, { passive: false });
                document.addEventListener('mouseup', stopResize);
                document.addEventListener('touchend', stopResize);

                element.style.transition = 'none';
            }

            function resize(e) {
                e.preventDefault();
                let currentX, currentY;
                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }

                let newWidth = startWidth + (currentX - startX);
                let newHeight = startHeight + (currentY - startY);

                // Boundaries: Resizing window bhi screen ke bahar na faile
                let maxWidth = window.innerWidth - parseInt(element.style.left, 10);
                let maxHeight = window.innerHeight - parseInt(element.style.top, 10) - 60;

                if (newWidth > maxWidth) newWidth = maxWidth;
                if (newHeight > maxHeight) newHeight = maxHeight;

                if (newWidth >= 300) element.style.width = newWidth + 'px';
                if (newHeight >= 200) element.style.height = newHeight + 'px';
            }

            function stopResize() {
                document.removeEventListener('mousemove', resize);
                document.removeEventListener('touchmove', resize);
                document.removeEventListener('mouseup', stopResize);
                document.removeEventListener('touchend', stopResize);

                element.style.transition = '';

                windowSizes[appId] = {
                    width: parseInt(element.style.width, 10),
                    height: parseInt(element.style.height, 10)
                };

                try {
                    localStorage.setItem('looney_window_sizes', JSON.stringify(windowSizes));
                } catch (e) { }
            }

            handle.addEventListener('mousedown', initResize);
            handle.addEventListener('touchstart', initResize, { passive: false });
        }
