<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LooneyOS</title>

    <script>
        const user = localStorage.getItem("user");
        if (!user) {
            window.location.href = "Loginpage.html";
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="boot-screen">
        <div class="brand-logo">
            <div class="logo-mark">
                <div class="l-vert"></div>
                <div class="l-horiz"></div>
                <div class="l-end"></div>
                <div class="l-dot"></div>
            </div>
            <div class="logo-text">LOONEY OS</div>
        </div>
    </div>

    <div id="desktop">
        <div id="desktop-icons"></div>
        <div id="window-container"></div>

        <div id="indicator-max" class="drag-indicator"></div>
        <div id="indicator-close" class="drag-indicator">
            <svg viewBox="0 0 24 24" style="width: 40px; height: 40px; stroke: var(--black); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none;">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn">
        <div class="mini-logo">
            <div class="mini-l-vert"></div>
            <div class="mini-l-horiz"></div>
            <div class="mini-l-end"></div>
            <div class="mini-l-dot"></div>
        </div>
        Looney
    </button>
        <div id="taskbar-apps"></div>
        <div id="clock">12:00 PM</div>
    </div>

    <div id="context-menu">
        <div class="context-item" id="ctx-refresh">
            <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; stroke: var(--black); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;">
            <path d="M21 2v6h-6"></path>
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
            <path d="M3 22v-6h6"></path>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
        </svg> Refresh
        </div>
        <div class="context-item" id="ctx-note">
            <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; stroke: var(--black); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg> Quick Note
        </div>
        <div class="context-item" id="ctx-settings">
            <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; stroke: var(--black); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;">
            <circle cx="12" cy="12" r="3"></circle>
            <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
        </svg> Settings
        </div>
    </div>

    <div id="global-drop-overlay">
        🖼️ Drop Wallpaper Here!
    </div>

    <script src="script.js"></script>
</body>

</html>
